name: Release
on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            goos: linux
            goarch: amd64
            binary: morfx-linux-amd64
          - os: ubuntu-24.04-arm
            goos: linux
            goarch: arm64
            binary: morfx-linux-arm64
          - os: macos-latest
            goos: darwin
            goarch: arm64
            binary: morfx-darwin-arm64
          - os: macos-latest
            goos: darwin
            goarch: amd64
            binary: morfx-darwin-amd64
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: '1.25'

      - name: Build
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          CGO_ENABLED: 1
        run: go build -o ${{ matrix.binary }} cmd/morfx/main.go

      - uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.binary }}
          path: ${{ matrix.binary }}

  release:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          merge-multiple: true

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            morfx-linux-amd64
            morfx-linux-arm64
            morfx-darwin-arm64
            morfx-darwin-amd64
