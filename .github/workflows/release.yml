name: Release
on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      tag:
        description: Existing tag to publish or republish
        required: true
        type: string

permissions:
  contents: write

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref_name }}

      - uses: actions/setup-go@v6
        with:
          go-version: '1.25'

      - name: Run repository verification
        run: |
          make verify

  build:
    needs: verify
    name: Build release archives
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            goos: linux
            goarch: amd64
          - os: ubuntu-24.04-arm
            goos: linux
            goarch: arm64
          - os: macos-latest
            goos: darwin
            goarch: arm64
          - os: macos-latest
            goos: darwin
            goarch: amd64
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref_name }}

      - uses: actions/setup-go@v6
        with:
          go-version: '1.25'

      - name: Build archive
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          CGO_ENABLED: 1
        run: |
          set -euo pipefail
          VERSION="${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref_name }}"
          COMMIT="${GITHUB_SHA::7}"
          BUILD_TIME="$(date -u '+%Y-%m-%dT%H:%M:%SZ')"
          ARCHIVE_DIR="release/morfx_${VERSION#v}_${GOOS}_${GOARCH}"
          mkdir -p "$ARCHIVE_DIR"

          EXT=""
          if [ "$GOOS" = "windows" ]; then
            EXT=".exe"
          fi

          go build -ldflags "-X github.com/oxhq/morfx/internal/buildinfo.Version=${VERSION} -X github.com/oxhq/morfx/internal/buildinfo.Commit=${COMMIT} -X github.com/oxhq/morfx/internal/buildinfo.BuildTime=${BUILD_TIME}" \
            -o "$ARCHIVE_DIR/morfx${EXT}" ./cmd/morfx

          for tool in query replace delete insert_before insert_after append file_query file_replace file_delete apply; do
            go build -o "$ARCHIVE_DIR/${tool}${EXT}" "./cmd/${tool}"
          done

          for asset in README.md docs/standalone-tools.md docs/standalone-recipes.md LICENSE tfx.yaml; do
            if [ -f "$asset" ]; then
              cp "$asset" "$ARCHIVE_DIR"/
            fi
          done
          tar -C release -czf "${ARCHIVE_DIR}.tar.gz" "$(basename "$ARCHIVE_DIR")"

      - uses: actions/upload-artifact@v4
        with:
          name: morfx-${{ matrix.goos }}-${{ matrix.goarch }}
          path: release/*.tar.gz

  release:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          ref: main

      - uses: actions/download-artifact@v4
        with:
          merge-multiple: true
          path: release

      - name: Prepare checksums and release notes
        run: |
          set -euo pipefail
          TAG="${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref_name }}"
          (cd release && sha256sum *.tar.gz > SHA256SUMS)
          NOTES_FILE="docs/release-notes-${TAG}.md"
          if [ -f "$NOTES_FILE" ]; then
            cp "$NOTES_FILE" release/RELEASE_NOTES.md
          else
            cat > release/RELEASE_NOTES.md <<EOF
          # Morfx ${TAG}

          This release bundles Morfx from tag ${TAG}.
          EOF
          fi

      - name: Publish release
        env:
          GH_TOKEN: ${{ github.token }}
          GH_REPO: ${{ github.repository }}
        run: |
          set -euo pipefail
          TAG="${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref_name }}"
          title="Morfx ${TAG}"
          if gh release view "$TAG" --repo "$GH_REPO" >/dev/null 2>&1; then
            gh release edit "$TAG" --repo "$GH_REPO" --title "$title" --notes-file release/RELEASE_NOTES.md
            gh release upload "$TAG" --repo "$GH_REPO" release/*.tar.gz release/SHA256SUMS --clobber
          else
            gh release create "$TAG" --repo "$GH_REPO" release/*.tar.gz release/SHA256SUMS \
              --title "$title" \
              --notes-file release/RELEASE_NOTES.md
          fi
