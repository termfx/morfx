name: CI
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-go@v6
        with:
          go-version: '1.25'

      - name: Run repository verification
        run: |
          make verify

  tfx:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-go@v6
        with:
          go-version: '1.25'

      - name: Install TFX
        run: go install github.com/oxhq/tfx/cmd/tfx@v0.1.1

      - name: Run TFX standalone flow
        run: |
          "$(go env GOPATH)/bin/tfx" --flow standalone --run --quiet

  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-go@v6
        with:
          go-version: '1.25'

      - name: Run strict lint
        continue-on-error: true
        run: make lint-strict
