# Comprehensive CI/CD Pipeline for morfx
# This workflow provides production-grade continuous integration including:
# - Multi-version Go testing
# - Code quality checks with golangci-lint
# - Security scanning with gosec
# - Race condition detection
# - Coverage reporting with threshold enforcement
# - Performance regression detection

name: CI

on:
  push:
    branches: [main, develop]
    tags: ["v*"]
  pull_request:
    branches: [main, develop]
    types: [opened, synchronize, reopened]
  workflow_dispatch:

# Cancel in-progress runs for the same workflow on the same branch/PR
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  # Go configuration
  GO_VERSION: "1.24"
  GO_VERSION_MATRIX: '["1.23", "1.24"]'

  # Coverage configuration
  COVERAGE_THRESHOLD: 80
  COVERAGE_FILE: coverage.out

  # Test configuration
  TEST_FLAGS: "-count=1 -covermode=atomic -coverpkg=./... -coverprofile=coverage.out"
  RACE_FLAGS: "-race"
  TIMEOUT: "10m"

  # Cache configuration
  GOCACHE: ~/.cache/go-build
  GOMODCACHE: ~/go/pkg/mod

jobs:
  # Pre-flight checks - fast feedback on common issues
  preflight:
    name: 🚦 Pre-flight Checks
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Set up Go
        uses: actions/setup-go@v4
        with:
          go-version: ${{ env.GO_VERSION }}
          check-latest: true

      - name: Cache Go modules
        uses: actions/cache@v4
        with:
          path: |
            ${{ env.GOCACHE }}
            ${{ env.GOMODCACHE }}
          key: ${{ runner.os }}-go-${{ hashFiles('**/go.sum') }}
          restore-keys: |
            ${{ runner.os }}-go-

      - name: Download dependencies
        run: go mod download

      - name: Verify dependencies
        run: go mod verify

      - name: Check go.mod tidiness
        run: |
          go mod tidy
          if ! git diff --quiet go.mod go.sum; then
            echo "❌ go.mod or go.sum is not tidy"
            git diff go.mod go.sum
            exit 1
          fi

      - name: Check for replace directives
        run: |
          if grep -q "^replace " go.mod; then
            echo "❌ go.mod contains replace directives:"
            grep "^replace " go.mod
            exit 1
          fi

      - name: Build check
        run: go build -v ./...

      - name: Go vet
        run: go vet ./...

  # Comprehensive linting and code quality
  lint:
    name: 🔍 Code Quality & Linting
    runs-on: ubuntu-latest
    needs: preflight
    timeout-minutes: 15

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0 # Full history for better analysis

      - name: Set up Go
        uses: actions/setup-go@v4
        with:
          go-version: ${{ env.GO_VERSION }}
          check-latest: true

      - name: Cache Go modules
        uses: actions/cache@v4
        with:
          path: |
            ${{ env.GOCACHE }}
            ${{ env.GOMODCACHE }}
          key: ${{ runner.os }}-go-${{ hashFiles('**/go.sum') }}
          restore-keys: |
            ${{ runner.os }}-go-

      - name: Download dependencies
        run: go mod download

      - name: Cache golangci-lint
        uses: actions/cache@v4
        with:
          path: ~/.cache/golangci-lint
          key: ${{ runner.os }}-golangci-lint-${{ hashFiles('.golangci.yml') }}
          restore-keys: |
            ${{ runner.os }}-golangci-lint-

      - name: Run golangci-lint
        uses: golangci/golangci-lint-action@v3
        with:
          version: latest
          args: --timeout=10m --verbose
          only-new-issues: false
          skip-cache: false
          skip-pkg-cache: false
          skip-build-cache: false

      - name: Run additional formatting checks
        run: |
          # Install formatting tools
          go install mvdan.cc/gofumpt@latest
          go install golang.org/x/tools/cmd/goimports@latest
          go install github.com/daixiang0/gci@latest

          # Check gofumpt formatting
          if [ "$(gofumpt -d .)" != "" ]; then
            echo "❌ Code is not formatted with gofumpt:"
            gofumpt -d .
            exit 1
          fi

          # Check import organization
          if [ "$(goimports -local github.com/termfx/morfx -d .)" != "" ]; then
            echo "❌ Imports are not organized correctly:"
            goimports -local github.com/termfx/morfx -d .
            exit 1
          fi

  # Security scanning
  security:
    name: 🛡️ Security Scan
    runs-on: ubuntu-latest
    needs: preflight
    timeout-minutes: 10

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v4
        with:
          go-version: ${{ env.GO_VERSION }}
          check-latest: true

      - name: Cache Go modules
        uses: actions/cache@v4
        with:
          path: |
            ${{ env.GOCACHE }}
            ${{ env.GOMODCACHE }}
          key: ${{ runner.os }}-go-${{ hashFiles('**/go.sum') }}
          restore-keys: |
            ${{ runner.os }}-go-

      - name: Download dependencies
        run: go mod download

      - name: Run gosec security scanner
        uses: securego/gosec@master
        with:
          args: "-severity medium -confidence medium -fmt sarif -out gosec-results.sarif ./..."

      - name: Upload gosec results to GitHub Security
        uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: gosec-results.sarif

      - name: Run vulnerability check
        run: |
          go install golang.org/x/vuln/cmd/govulncheck@latest
          govulncheck ./...

  # Comprehensive testing matrix
  test:
    name: 🧪 Test Suite (Go ${{ matrix.go-version }}, ${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    needs: [preflight, lint]
    timeout-minutes: 20

    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        go-version: ["1.23", "1.24"]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Go ${{ matrix.go-version }}
        uses: actions/setup-go@v4
        with:
          go-version: ${{ matrix.go-version }}
          check-latest: true

      - name: Cache Go modules
        uses: actions/cache@v4
        with:
          path: |
            ${{ env.GOCACHE }}
            ${{ env.GOMODCACHE }}
          key: ${{ runner.os }}-go${{ matrix.go-version }}-${{ hashFiles('**/go.sum') }}
          restore-keys: |
            ${{ runner.os }}-go${{ matrix.go-version }}-
            ${{ runner.os }}-go-

      - name: Download dependencies
        run: go mod download

      - name: Run tests with coverage (Linux/macOS)
        if: runner.os != 'Windows'
        run: |
          # FTS5 tests
          MORFX_ENCRYPTION_MODE=off go test ${{ env.TEST_FLAGS }} -tags sqlite_fts5 -timeout ${{ env.TIMEOUT }} ./...

          # NO-FTS5 specific tests
          MORFX_FORCE_NO_FTS5=1 MORFX_ENCRYPTION_MODE=blob MORFX_MASTER_KEY=0123456789abcdef0123456789abcdef \
            go test ${{ env.TEST_FLAGS }} -timeout ${{ env.TIMEOUT }} ./internal/db -run '^(TestOpenAndMigrate_FallbackNoFTS5|TestRollbackCrashResumeCPA|TestRollbackCrashResumeCPB)$'

      - name: Run tests with coverage (Windows)
        if: runner.os == 'Windows'
        run: |
          # FTS5 tests (Windows doesn't support all environment variable formats)
          $env:MORFX_ENCRYPTION_MODE="off"
          go test ${{ env.TEST_FLAGS }} -tags sqlite_fts5 -timeout ${{ env.TIMEOUT }} ./...

      - name: Run race condition tests
        run: go test ${{ env.RACE_FLAGS }} -short -timeout ${{ env.TIMEOUT }} ./...

      - name: Run integration tests
        run: make gate

      - name: Upload coverage reports to Codecov
        if: matrix.os == 'ubuntu-latest' && matrix.go-version == env.GO_VERSION
        uses: codecov/codecov-action@v5
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: ./coverage.out
          flags: unittests
          name: codecov-umbrella
          fail_ci_if_error: false # Don't fail CI if upload fails
          slug: termfx/morfx
          verbose: true

  # Coverage analysis and enforcement
  coverage:
    name: 📊 Coverage Analysis
    runs-on: ubuntu-latest
    needs: test
    timeout-minutes: 10

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v4
        with:
          go-version: ${{ env.GO_VERSION }}
          check-latest: true

      - name: Cache Go modules
        uses: actions/cache@v4
        with:
          path: |
            ${{ env.GOCACHE }}
            ${{ env.GOMODCACHE }}
          key: ${{ runner.os }}-go-${{ hashFiles('**/go.sum') }}
          restore-keys: |
            ${{ runner.os }}-go-

      - name: Download dependencies
        run: go mod download

      - name: Generate coverage report
        run: |
          # Run tests with coverage
          MORFX_ENCRYPTION_MODE=off go test ${{ env.TEST_FLAGS }} -tags sqlite_fts5 ./...

          # Generate coverage reports
          go tool cover -html=coverage.out -o coverage.html
          go tool cover -func=coverage.out -o coverage.txt

      - name: Check coverage threshold
        run: |
          COVERAGE=$(go tool cover -func=coverage.out | tail -n1 | awk '{print $3}' | sed 's/%//')
          echo "Current coverage: ${COVERAGE}%"
          echo "Required coverage: ${{ env.COVERAGE_THRESHOLD }}%"

          # Use bc for decimal comparison
          if (( $(echo "${COVERAGE} < ${{ env.COVERAGE_THRESHOLD }}" | bc -l) )); then
            echo "❌ Coverage ${COVERAGE}% is below required ${{ env.COVERAGE_THRESHOLD }}%"
            echo "## 📊 Coverage Report" >> $GITHUB_STEP_SUMMARY
            echo "- **Current Coverage:** ${COVERAGE}%" >> $GITHUB_STEP_SUMMARY
            echo "- **Required Coverage:** ${{ env.COVERAGE_THRESHOLD }}%" >> $GITHUB_STEP_SUMMARY
            echo "- **Status:** ❌ Below Threshold" >> $GITHUB_STEP_SUMMARY
            exit 1
          else
            echo "✅ Coverage ${COVERAGE}% meets required ${{ env.COVERAGE_THRESHOLD }}%"
            echo "## 📊 Coverage Report" >> $GITHUB_STEP_SUMMARY
            echo "- **Current Coverage:** ${COVERAGE}%" >> $GITHUB_STEP_SUMMARY
            echo "- **Required Coverage:** ${{ env.COVERAGE_THRESHOLD }}%" >> $GITHUB_STEP_SUMMARY  
            echo "- **Status:** ✅ Meets Threshold" >> $GITHUB_STEP_SUMMARY
          fi

      - name: Upload coverage artifacts
        uses: actions/upload-artifact@v4
        with:
          name: coverage-reports
          path: |
            coverage.out
            coverage.html
            coverage.txt
          retention-days: 30

  # Performance regression testing
  benchmark:
    name: 🏃‍♂️ Performance Benchmarks
    runs-on: ubuntu-latest
    needs: test
    timeout-minutes: 15

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v4
        with:
          go-version: ${{ env.GO_VERSION }}
          check-latest: true

      - name: Cache Go modules
        uses: actions/cache@v4
        with:
          path: |
            ${{ env.GOCACHE }}
            ${{ env.GOMODCACHE }}
          key: ${{ runner.os }}-go-${{ hashFiles('**/go.sum') }}
          restore-keys: |
            ${{ runner.os }}-go-

      - name: Download dependencies
        run: go mod download

      - name: Run benchmarks
        run: |
          # Run benchmarks and save results
          go test -bench=. -benchmem -count=3 -timeout 10m ./... > benchmark-results.txt 2>&1 || true

          # Display results
          echo "## 🏃‍♂️ Benchmark Results" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
          head -50 benchmark-results.txt >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY

      - name: Upload benchmark results
        uses: actions/upload-artifact@v4
        with:
          name: benchmark-results
          path: benchmark-results.txt
          retention-days: 30

  # Build verification for different platforms
  build:
    name: 🏗️ Build Verification
    runs-on: ubuntu-latest
    needs: [lint, security]
    timeout-minutes: 10

    strategy:
      matrix:
        goos: [linux, darwin, windows]
        goarch: [amd64, arm64]
        exclude:
          # Windows arm64 is not commonly used
          - goos: windows
            goarch: arm64

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v4
        with:
          go-version: ${{ env.GO_VERSION }}
          check-latest: true

      - name: Cache Go modules
        uses: actions/cache@v4
        with:
          path: |
            ${{ env.GOCACHE }}
            ${{ env.GOMODCACHE }}
          key: ${{ runner.os }}-go-${{ hashFiles('**/go.sum') }}
          restore-keys: |
            ${{ runner.os }}-go-

      - name: Download dependencies
        run: go mod download

      - name: Build for ${{ matrix.goos }}/${{ matrix.goarch }}
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          CGO_ENABLED: 1
        run: |
          # Build main binary
          go build -v -o morfx-${{ matrix.goos }}-${{ matrix.goarch }} ./cmd/morfx

          # Build provider generator
          go build -v -o morfx-provider-gen-${{ matrix.goos }}-${{ matrix.goarch }} ./cmd/morfx-provider-gen

          # Verify binaries were created
          ls -la morfx-* || true

  # Final success gate - all jobs must pass
  success:
    name: ✅ All Checks Passed
    runs-on: ubuntu-latest
    needs: [preflight, lint, security, test, coverage, benchmark, build]
    timeout-minutes: 5

    steps:
      - name: Success
        run: |
          echo "🎉 All CI checks passed successfully!"
          echo "## ✅ CI Pipeline Complete" >> $GITHUB_STEP_SUMMARY
          echo "All quality gates have been satisfied:" >> $GITHUB_STEP_SUMMARY
          echo "- ✅ Pre-flight checks" >> $GITHUB_STEP_SUMMARY
          echo "- ✅ Code quality & linting" >> $GITHUB_STEP_SUMMARY
          echo "- ✅ Security scanning" >> $GITHUB_STEP_SUMMARY
          echo "- ✅ Multi-platform testing" >> $GITHUB_STEP_SUMMARY
          echo "- ✅ Coverage threshold (${{ env.COVERAGE_THRESHOLD }}%)" >> $GITHUB_STEP_SUMMARY
          echo "- ✅ Performance benchmarks" >> $GITHUB_STEP_SUMMARY
          echo "- ✅ Cross-platform builds" >> $GITHUB_STEP_SUMMARY
