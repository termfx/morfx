name: CI
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-go@v6
        with:
          go-version: '1.25'

      - name: Run repository verification
        run: |
          make verify

  windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-go@v6
        with:
          go-version: '1.25'

      - name: Install Zig toolchain
        shell: pwsh
        run: |
          $ProgressPreference = 'SilentlyContinue'
          $version = '0.16.0'
          $zipPath = Join-Path $env:RUNNER_TEMP 'zig.zip'
          $extractDir = Join-Path $env:RUNNER_TEMP 'zig'
          Invoke-WebRequest -Uri "https://ziglang.org/download/$version/zig-x86_64-windows-$version.zip" -OutFile $zipPath
          Expand-Archive -Path $zipPath -DestinationPath $extractDir -Force
          $zigDir = Get-ChildItem -Path $extractDir -Directory | Select-Object -First 1
          $zigDir.FullName | Out-File -FilePath $env:GITHUB_PATH -Encoding utf8 -Append
          'CC=zig cc -target x86_64-windows-gnu' | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append

      - name: Run Windows verification
        shell: pwsh
        env:
          CGO_ENABLED: '1'
        run: |
          .\tools\scripts\verify-windows.ps1

  tfx:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-go@v6
        with:
          go-version: '1.25'

      - name: Install TFX
        run: go install github.com/oxhq/tfx/cmd/tfx@v0.1.1

      - name: Run TFX standalone flow
        run: |
          "$(go env GOPATH)/bin/tfx" --flow standalone --run --quiet

  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-go@v6
        with:
          go-version: '1.25'

      - name: Run strict lint
        run: make lint-strict
