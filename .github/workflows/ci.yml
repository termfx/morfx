name: CI
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  tfx:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-go@v6
        with:
          go-version: '1.25'

      - name: Install TFX
        run: go install github.com/oxhq/tfx/cmd/tfx@v0.1.1

      - name: Run TFX CI flow
        run: "$(go env GOPATH)/bin/tfx" --flow ci --run --quiet

      - name: Run TFX standalone flow
        run: "$(go env GOPATH)/bin/tfx" --flow standalone --run --quiet

  lint:
    continue-on-error: true
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-go@v6
        with:
          go-version: '1.25'

      - name: Run strict lint
        run: make lint-strict
