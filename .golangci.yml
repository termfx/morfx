# golangci-lint v2 configuration for morfx
# Version: 2.4.0

linters:
  disable-all: true
  enable:
    # Base linters (core functionality)
    - gofmt # Standard formatting
    - goimports # Import organization
    - govet # Standard go vet checks
    - ineffassign # Detect ineffective assignments
    - misspell # Spelling mistakes
    - unused # Detect unused code (replaces deadcode, varcheck, structcheck)

    # Security
    - gosec # Security checks (includes all G-checks)

    # Error handling
    - errcheck # Check for unchecked errors
    - errorlint # Error handling best practices
    - wrapcheck # Check error wrapping
    - nilerr # Check returning nil even with non-nil error

    # Code quality
    - revive # Configurable Go linting
    - gocritic # Comprehensive code critic
    - staticcheck # Advanced static analysis
    - goconst # Find repeated strings for constants
    - gocognit # Cognitive complexity
    - gocyclo # Cyclomatic complexity
    - cyclop # Package-level cyclomatic complexity
    - funlen # Function length checking
    - nestif # Nested if statements
    - lll # Line length limit
    - whitespace # Whitespace issues
    - wsl # Whitespace linter

    # Performance
    - prealloc # Find slice declarations that could be preallocated
    - bodyclose # Check HTTP response body closed
    - rowserrcheck # Check SQL rows.Err
    - sqlclosecheck # Check SQL Close() called
    - unconvert # Remove unnecessary type conversions
    - unparam # Find unused function parameters

    # Style and consistency
    - gofumpt # Stricter gofmt
    - gci # Import organization
    - asciicheck # Non-ASCII identifiers
    - bidichk # Bidirectional unicode characters
    - decorder # Check declaration order
    - grouper # Import grouping
    - importas # Import aliasing
    - makezero # Make slice initialization
    - nakedret # Naked returns
    - nolintlint # Nolint directive usage
    - predeclared # Predeclared identifier shadowing
    - tagliatelle # Struct tag naming
    - thelper # Test helper detection
    - tparallel # Parallel test detection
    - godot # Comment punctuation

    # Go best practices
    - contextcheck # Context usage patterns
    - durationcheck # Duration multiplication checks
    - exhaustive # Enum switch exhaustiveness
    - forbidigo # Forbid specific patterns
    - forcetypeassert # Force type assertions
    - gomoddirectives # Go mod directives
    - ireturn # Interface return types
    - maintidx # Maintainability index
    - nosprintfhostport # Sprint host port
    - promlinter # Prometheus metrics
    - reassign # Variable reassignment
    - testableexamples # Testable examples
    - testpackage # Test package naming
    - usestdlibvars # Use stdlib constants
    - wastedassign # Wasted assignments

linters-settings:
  errcheck:
    check-type-assertions: true
    check-blank: true

  revive:
    ignore-generated-header: true
    severity: warning
    confidence: 0.8
    rules:
      - name: blank-imports
      - name: context-as-argument
      - name: context-keys-type
      - name: dot-imports
      - name: error-return
      - name: error-strings
      - name: error-naming
      - name: exported
      - name: if-return
      - name: increment-decrement
      - name: var-naming
      - name: var-declaration
      - name: package-comments
      - name: range
      - name: receiver-naming
      - name: time-naming
      - name: unexported-return
      - name: indent-error-flow
      - name: errorf
      - name: empty-block
      - name: superfluous-else
      - name: unused-parameter
      - name: unreachable-code
      - name: redefines-builtin-id
      - name: early-return
      - name: unconditional-recursion
      - name: modifies-parameter
      - name: constant-logical-expr
      - name: bool-literal-in-expr
      - name: range-val-in-closure
      - name: comment-spacings
      - name: string-of-int
      - name: string-format
      - name: struct-tag
      - name: atomic
      - name: empty-lines
      - name: line-length-limit
        arguments: [100]
      - name: cognitive-complexity
        arguments: [15]
      - name: cyclomatic
        arguments: [10]
      - name: max-public-structs
        arguments: [5]
      - name: function-result-limit
        arguments: [3]
      - name: argument-limit
        arguments: [5]
      - name: function-length
        arguments: [50, 75]

  gocritic:
    enabled-tags:
      - diagnostic
      - experimental
      - opinionated
      - performance
      - style
    disabled-checks:
      - dupImport
      - ifElseChain
      - octalLiteral
      - whyNoLint
    settings:
      captLocal:
        paramsOnly: true
      rangeValCopy:
        sizeThreshold: 64
      underef:
        skipRecvDeref: true

  gocognit:
    min-complexity: 15

  gocyclo:
    min-complexity: 10

  cyclop:
    max-complexity: 10
    package-average: 5.0
    skip-tests: true

  funlen:
    lines: 75
    statements: 50

  nestif:
    min-complexity: 4

  maintidx:
    under: 20

  lll:
    line-length: 100

  gofumpt:
    extra-rules: true
    module-path: github.com/termfx/morfx

  gci:
    sections:
      - standard
      - default
      - prefix(github.com/termfx/morfx)
    skip-generated: true
    custom-order: true

  goimports:
    local-prefixes: github.com/termfx/morfx

  prealloc:
    simple: true
    range-loops: true
    for-loops: true

  gosec:
    severity: medium
    confidence: medium
    excludes:
      - G104 # Allow unchecked errors in tests

  testpackage:
    skip-regexp: '(export|internal)_test\.go'

  thelper:
    test:
      first: true
      name: true
      begin: true
    benchmark:
      first: true
      name: true
      begin: true

issues:
  max-issues-per-linter: 50
  max-same-issues: 3
  new: false

  exclude-rules:
    # Tests
    - path: _test\.go
      linters:
        - gocyclo
        - errcheck
        - dupl
        - gosec
        - goconst
        - funlen
        - lll
        - maintidx
        - gocognit

    # Examples
    - path: example_.*\.go
      linters:
        - errcheck
        - goconst

    # Generated files
    - path: \.gen\.go$
      linters:
        - lll
        - gofmt
        - gofumpt
        - gci

    # go:generate lines
    - source: "^//go:generate "
      linters:
        - lll

    # Shadow err
    - text: 'shadow: declaration of "err"'
      linters:
        - govet

    # Dot imports en tests
    - path: _test\.go
      text: "should not use dot imports"
      linters:
        - revive

  exclude-dirs:
    - vendor
    - testdata
    - third_party
    - .git

  exclude-files:
    - ".*\\.gen\\.go$"
    - "mock_.*\\.go$"

  exclude:
    - "Error return value of .((os\\.)?std(out|err)\\..*|.*Close|.*Flush|os\\.Remove(All)?|.*printf?|os\\.(Un)?Setenv). is not checked"

output:
  formats:
    colored-line-number: {}
  print-issued-line: true
  print-linter-name: true
  uniq-by-line: true
  sort-results: true

run:
  timeout: 5m
  issues-exit-code: 1
  tests: true
  build-tags:
    - sqlite_fts5
    - integration
  modules-download-mode: readonly
  allow-parallel-runners: true
  go: "1.24"
