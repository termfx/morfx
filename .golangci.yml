version: "2"
run:
  go: "1.24"
  build-tags:
    - sqlite_fts5
    - integration
  modules-download-mode: readonly
  issues-exit-code: 1
  tests: true
  allow-parallel-runners: true
output:
  formats:
    text:
      path: stdout
linters:
  default: none
  enable:
    - asciicheck
    - bidichk
    - bodyclose
    - contextcheck
    - cyclop
    - decorder
    - durationcheck
    - errcheck
    - errorlint
    - exhaustive
    - forbidigo
    - forcetypeassert
    - funlen
    - gocognit
    - goconst
    - gocritic
    - gocyclo
    - godot
    - gomoddirectives
    - gosec
    - govet
    - grouper
    - importas
    - ineffassign
    - ireturn
    - lll
    - maintidx
    - makezero
    - misspell
    - nakedret
    - nestif
    - nilerr
    - nolintlint
    - nosprintfhostport
    - prealloc
    - predeclared
    - promlinter
    - reassign
    - revive
    - rowserrcheck
    - sqlclosecheck
    - staticcheck
    - tagliatelle
    - testableexamples
    - testpackage
    - thelper
    - tparallel
    - unconvert
    - unparam
    - unused
    - usestdlibvars
    - wastedassign
    - whitespace
    - wrapcheck
    - wsl
  settings:
    cyclop:
      max-complexity: 10
      package-average: 5
    errcheck:
      check-type-assertions: true
      check-blank: true
    funlen:
      lines: 75
      statements: 50
    gocognit:
      min-complexity: 15
    gocritic:
      disabled-checks:
        - dupImport
        - ifElseChain
        - octalLiteral
        - whyNoLint
      enabled-tags:
        - diagnostic
        - experimental
        - opinionated
        - performance
        - style
      settings:
        captLocal:
          paramsOnly: true
        rangeValCopy:
          sizeThreshold: 64
        underef:
          skipRecvDeref: true
    gocyclo:
      min-complexity: 10
    gosec:
      excludes:
        - G104
      severity: medium
      confidence: medium
    lll:
      line-length: 100
    maintidx:
      under: 20
    nestif:
      min-complexity: 4
    prealloc:
      simple: true
      range-loops: true
      for-loops: true
    revive:
      confidence: 0.8
      severity: warning
      rules:
        - name: blank-imports
        - name: context-as-argument
        - name: context-keys-type
        - name: dot-imports
        - name: error-return
        - name: error-strings
        - name: error-naming
        - name: exported
        - name: if-return
        - name: increment-decrement
        - name: var-naming
        - name: var-declaration
        - name: package-comments
        - name: range
        - name: receiver-naming
        - name: time-naming
        - name: unexported-return
        - name: indent-error-flow
        - name: errorf
        - name: empty-block
        - name: superfluous-else
        - name: unused-parameter
        - name: unreachable-code
        - name: redefines-builtin-id
        - name: early-return
        - name: unconditional-recursion
        - name: modifies-parameter
        - name: constant-logical-expr
        - name: bool-literal-in-expr
        - name: range-val-in-closure
        - name: comment-spacings
        - name: string-of-int
        - name: string-format
        - name: struct-tag
        - name: atomic
        - name: empty-lines
        - name: line-length-limit
          arguments:
            - 100
        - name: cognitive-complexity
          arguments:
            - 15
        - name: cyclomatic
          arguments:
            - 10
        - name: max-public-structs
          arguments:
            - 5
        - name: function-result-limit
          arguments:
            - 3
        - name: argument-limit
          arguments:
            - 5
        - name: function-length
          arguments:
            - 50
            - 75
    testpackage:
      skip-regexp: (export|internal)_test\.go
    thelper:
      test:
        first: true
        name: true
        begin: true
      benchmark:
        first: true
        name: true
        begin: true
  exclusions:
    generated: lax
    presets:
      - comments
      - common-false-positives
      - legacy
      - std-error-handling
    rules:
      - linters:
          - dupl
          - errcheck
          - funlen
          - gocognit
          - goconst
          - gocyclo
          - gosec
          - lll
          - maintidx
        path: _test\.go
      - linters:
          - errcheck
          - goconst
        path: example_.*\.go
      - linters:
          - lll
        path: \.gen\.go$
      - linters:
          - lll
        source: '^//go:generate '
      - linters:
          - govet
        text: 'shadow: declaration of "err"'
      - linters:
          - revive
        path: _test\.go
        text: should not use dot imports
      - path: (.+)\.go$
        text: Error return value of .((os\.)?std(out|err)\..*|.*Close|.*Flush|os\.Remove(All)?|.*printf?|os\.(Un)?Setenv). is not checked
      - linters:
          - cyclop
        path: (.+)_test\.go
    paths:
      - .*\.gen\.go$
      - mock_.*\.go$
      - vendor
      - testdata
      - third_party
      - .git
      - third_party$
      - builtin$
      - examples$
issues:
  max-issues-per-linter: 50
  max-same-issues: 3
  uniq-by-line: true
  new: false
formatters:
  enable:
    - gci
    - gofmt
    - gofumpt
    - goimports
  settings:
    gci:
      sections:
        - standard
        - default
        - prefix(github.com/termfx/morfx)
      custom-order: true
    gofumpt:
      module-path: github.com/termfx/morfx
      extra-rules: true
    goimports:
      local-prefixes:
        - github.com/termfx/morfx
  exclusions:
    generated: lax
    paths:
      - .*\.gen\.go$
      - mock_.*\.go$
      - vendor
      - testdata
      - third_party
      - .git
      - third_party$
      - builtin$
      - examples$
      - \.gen\.go$
